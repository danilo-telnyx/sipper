version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sipper-db
    environment:
      POSTGRES_DB: sipper
      POSTGRES_USER: sipper
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sipper_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sipper"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: sipper-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://sipper:${DB_PASSWORD:-sipper_dev_password}@db:5432/sipper
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    restart: unless-stopped

volumes:
  postgres_data:
